<!DOCTYPE html>
<html>
<head>
    <title>Attendance</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<h1>Attendance Report</h1>

<table>
    <tr>
        {% for col in header %}
        <th>{{ col }}</th>
        {% endfor %}
    </tr>

    {% for row in data %}
    <tr>
        {% for item in row %}
        <td>{{ item }}</td>
        {% endfor %}
    </tr>
    {% endfor %}
</table>

<br>
<a href="/"><button>Back</button></a>

</body>
</html>
