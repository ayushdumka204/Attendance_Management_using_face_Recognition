<!DOCTYPE html>
<html>
<head>
    <title>Face Recognition Attendance</title>
    <link rel="stylesheet" href="/static/style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            text-align: center;
            font-family: Arial, sans-serif;
        }

        input {
            padding: 10px;
            margin: 5px;
            width: 200px;
        }

        button {
            padding: 10px 20px;
            margin: 5px;
            cursor: pointer;
            border: none;
            background-color: #007bff;
            color: white;
            border-radius: 5px;
        }

        button:hover {
            background-color: #0056b3;
        }

        video {
            border-radius: 10px;
            margin-top: 10px;
        }

        .container {
            margin-top: 20px;
        }

        .section {
            margin-top: 30px;
        }
    </style>
</head>
<body>

<h1>🎯 Face Recognition Attendance System</h1>

<div class="container">

    <!-- ===== USER INPUT ===== -->
    <div class="section">
        <h3>Enter Details</h3>
        <input type="text" id="id" placeholder="Enter ID" required>
        <input type="text" id="name" placeholder="Enter Name" required>
    </div>

    <!-- ===== CAMERA ===== -->
    <div class="section">
        <h3>Camera</h3>
        <video id="video" width="350" autoplay></video>
        <br><br>

        <button onclick="capture()">📸 Add Person</button>
        <button onclick="recognize()">🧠 Mark Attendance</button>
    </div>

    <!-- ===== ACTION BUTTONS ===== -->
    <div class="section">
        <a href="/train"><button>⚙️ Train Model</button></a>
        <a href="/attendance"><button>📊 View Attendance</button></a>
    </div>

    <!-- ===== RESULT ===== -->
    <div class="section">
        <h3>Status</h3>
        <p id="result">Waiting...</p>
    </div>

</div>

<script>
// ===== CAMERA ACCESS =====
navigator.mediaDevices.getUserMedia({ video: true })
.then(stream => {
    document.getElementById("video").srcObject = stream;
})
.catch(err => {
    document.getElementById("result").innerText = "Camera access denied ❌";
});


// ===== CAPTURE FUNCTION =====
function capture() {
    const id = document.getElementById("id").value;
    const name = document.getElementById("name").value;

    if (!id || !name) {
        alert("Enter ID and Name ❌");
        return;
    }

    sendImage("/upload", { id, name });
}


// ===== RECOGNIZE FUNCTION =====
function recognize() {
    sendImage("/recognize_upload");
}


// ===== COMMON IMAGE SENDER =====
function sendImage(url, extraData = {}) {
    const video = document.getElementById("video");
    const canvas = document.createElement("canvas");

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    canvas.getContext("2d").drawImage(video, 0, 0);

    canvas.toBlob(blob => {
        const formData = new FormData();
        formData.append("image", blob);

        // extra data add (id, name)
        for (let key in extraData) {
            formData.append(key, extraData[key]);
        }

        document.getElementById("result").innerText = "Processing... ⏳";

        fetch(url, {
            method: "POST",
            body: formData
        })
        .then(res => res.text())
        .then(data => {
            document.getElementById("result").innerText = data;
        })
        .catch(err => {
            document.getElementById("result").innerText = "Error ❌";
        });
    });
}
</script>

</body>
</html>
