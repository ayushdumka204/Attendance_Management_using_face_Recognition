<!DOCTYPE html>
<html>
<head>
    <title>Attendance System</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<h1>Face Recognition Attendance System</h1>

<input type="text" id="id" placeholder="Enter ID" required>
<input type="text" id="name" placeholder="Enter Name" required>
<br><br>
<button onclick="capture()">Add Person (Camera)</button>

<br>

<a href="/train"><button>Train Images</button></a>
<a href="/recognize"><button>Mark Attendance</button></a>
<a href="/attendance"><button>View Attendance</button></a>

<hr>

<!-- ===== NEW CAMERA SECTION 🔥 ===== -->
<h2>Browser Camera Capture</h2>

<video id="video" width="400" autoplay style="border:1px solid black;"></video>
<br><br>
<button onclick="capture()">Capture Face</button>

<p id="result"></p>

<script>
navigator.mediaDevices.getUserMedia({ video: true })
.then(stream => {
    document.getElementById("video").srcObject = stream;
})
.catch(err => {
    document.getElementById("result").innerText = "Camera access denied ❌";
});

function capture() {
    const id = document.getElementById("id").value;
    const name = document.getElementById("name").value;

    if (!id || !name) {
        alert("Enter ID and Name ❌");
        return;
    }

    const canvas = document.createElement("canvas");
    const video = document.getElementById("video");

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    canvas.getContext("2d").drawImage(video, 0, 0);

    canvas.toBlob(blob => {
        const formData = new FormData();
        formData.append("image", blob);
        formData.append("id", id);
        formData.append("name", name);

        fetch("/upload", {
            method: "POST",
            body: formData
        })
        .then(res => res.text())
        .then(data => {
            document.getElementById("result").innerText = data;
        });
    });
}
</script>

</body>
</html>
