<!DOCTYPE html>
<html>
<head>
    <title>Attendance System</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            background: #0f172a;
            color: white;
            text-align: center;
            font-family: Arial;
        }

        .container {
            margin-top: 50px;
        }

        button {
            padding: 15px 30px;
            margin: 10px;
            font-size: 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        .primary { background: #2563eb; }
        .success { background: #16a34a; }
        .danger { background: #dc2626; }
        .dark { background: #1e293b; }

        video {
            width: 350px;
            display: none;
            margin-top: 20px;
            border-radius: 10px;
        }

        .popup {
            display: none;
            position: fixed;
            top: 30%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #1e293b;
            padding: 20px;
            border-radius: 10px;
        }

        input {
            padding: 10px;
            margin: 5px;
        }
    </style>
</head>
<body>

<h1>🎯 Attendance Capture System</h1>

<div class="container">

    <button class="primary" onclick="openAddPerson()">Add Person</button>
    <button class="success" onclick="train()">Train Images</button>
    <button class="dark" onclick="markAttendance()">Mark Attendance</button>
    <a href="/attendance"><button>View Attendance</button></a>

</div>

<!-- CAMERA -->
<video id="video" autoplay></video>

<!-- ADD PERSON POPUP -->
<div class="popup" id="addPopup">
    <h3>Enter Details</h3>
    <input id="id" placeholder="ID">
    <input id="name" placeholder="Name">
    <br><br>
    <button onclick="startCamera()">Start Camera</button>
</div>

<script>

let stream;

// ===== ADD PERSON FLOW =====
function openAddPerson() {
    document.getElementById("addPopup").style.display = "block";
}

function startCamera() {
    navigator.mediaDevices.getUserMedia({ video: true })
    .then(s => {
        stream = s;
        const video = document.getElementById("video");
        video.srcObject = stream;
        video.style.display = "block";

        setTimeout(captureImage, 2000); // auto capture after 2 sec
    });
}

function captureImage() {
    const id = document.getElementById("id").value;
    const name = document.getElementById("name").value;

    const canvas = document.createElement("canvas");
    const video = document.getElementById("video");

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    canvas.getContext("2d").drawImage(video, 0, 0);

    canvas.toBlob(blob => {
        const formData = new FormData();
        formData.append("image", blob);
        formData.append("id", id);
        formData.append("name", name);

        fetch("/upload", {
            method: "POST",
            body: formData
        })
        .then(res => res.text())
        .then(msg => {
            alert(msg); // ✅ popup like PDF
            closeCamera();
        });
    });
}

function closeCamera() {
    stream.getTracks().forEach(track => track.stop());
    document.getElementById("video").style.display = "none";
    document.getElementById("addPopup").style.display = "none";
}


// ===== TRAIN =====
function train() {
    fetch("/train")
    .then(res => res.text())
    .then(msg => alert(msg));
}


// ===== MARK ATTENDANCE =====
function markAttendance() {

    let choice = confirm("Clock IN? (Cancel = Clock OUT)");

    navigator.mediaDevices.getUserMedia({ video: true })
    .then(s => {
        stream = s;
        const video = document.getElementById("video");
        video.srcObject = stream;
        video.style.display = "block";

        setTimeout(() => {
            const canvas = document.createElement("canvas");
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;

            canvas.getContext("2d").drawImage(video, 0, 0);

            canvas.toBlob(blob => {
                const formData = new FormData();
                formData.append("image", blob);
                formData.append("type", choice ? "IN" : "OUT");

                fetch("/recognize_upload", {
                    method: "POST",
                    body: formData
                })
                .then(res => res.text())
                .then(msg => {
                    alert(msg); // ✅ popup
                    closeCamera();
                });
            });

        }, 2000);
    });
}

</script>

</body>
</html>
