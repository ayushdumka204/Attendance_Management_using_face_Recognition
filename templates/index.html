<!DOCTYPE html>
<html>
<head>
    <title>Attendance System</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            background: #0f172a;
            color: white;
            text-align: center;
            font-family: Arial;
        }

        button {
            padding: 12px 25px;
            margin: 10px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        video {
            width: 350px;
            border-radius: 10px;
        }

        .popup {
            display: none;
            position: fixed;
            top: 30%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #1e293b;
            padding: 20px;
            border-radius: 10px;
        }

        input {
            padding: 10px;
            margin: 5px;
        }

        #resultText {
            font-size: 20px;
            margin-top: 15px;
        }
    </style>
</head>
<body>

<h1>🎯 Attendance System</h1>

<button onclick="openAddPerson()">Add Person</button>
<button onclick="train()">Train</button>
<button onclick="markAttendance()">Mark Attendance</button>
<button onclick="manualClockOut()">Clock OUT</button>
<a href="/attendance"><button>View</button></a>

<br><br>

<video id="video" autoplay></video>

<p id="resultText"></p>

<!-- ADD PERSON POPUP -->
<div class="popup" id="popup">
    <input id="id" placeholder="ID">
    <input id="name" placeholder="Name">
    <br><br>
    <button onclick="startCamera()">Start Camera</button>
    <button onclick="capture()">Capture</button>
</div>

<script>

let stream;

// ===== CAMERA START =====
function startCamera() {
    navigator.mediaDevices.getUserMedia({ video: true })
    .then(s => {
        stream = s;
        const video = document.getElementById("video");
        video.srcObject = stream;

        return new Promise(resolve => {
            video.onloadedmetadata = () => resolve(video);
        });
    });
}

// ===== OPEN POPUP =====
function openAddPerson() {
    document.getElementById("popup").style.display = "block";
}

// ===== CAPTURE FIXED =====
function capture() {
    const id = document.getElementById("id").value;
    const name = document.getElementById("name").value;

    if (!id || !name) {
        alert("Enter ID & Name ❌");
        return;
    }

    const video = document.getElementById("video");

    if (video.videoWidth === 0) {
        alert("Camera not ready ❌");
        return;
    }

    const canvas = document.createElement("canvas");
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    canvas.getContext("2d").drawImage(video, 0, 0);

    canvas.toBlob(blob => {
        const formData = new FormData();
        formData.append("image", blob);
        formData.append("id", id);
        formData.append("name", name);

        fetch("/upload", {
            method: "POST",
            body: formData
        })
        .then(res => res.text())
        .then(msg => {
            alert(msg);
            closeCamera();
        });
    });
}

// ===== CLOSE CAMERA =====
function closeCamera() {
    if (stream) stream.getTracks().forEach(track => track.stop());
    document.getElementById("popup").style.display = "none";
}

// ===== TRAIN =====
function train() {
    fetch("/train")
    .then(() => alert("Training Done ✅"));
}

// ===== MARK ATTENDANCE =====
function markAttendance() {
    startCamera();

    setTimeout(() => {
        recognize("IN");
    }, 2000);
}

// ===== MANUAL OUT =====
function manualClockOut() {
    recognize("OUT");
    closeCamera();
}

// ===== RECOGNITION =====
function recognize(type) {
    const video = document.getElementById("video");

    const canvas = document.createElement("canvas");
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    canvas.getContext("2d").drawImage(video, 0, 0);

    canvas.toBlob(blob => {
        const formData = new FormData();
        formData.append("image", blob);
        formData.append("type", type);

        fetch("/recognize_upload", {
            method: "POST",
            body: formData
        })
        .then(res => res.json())
        .then(data => {

            if (data.status === "success") {
                document.getElementById("resultText").innerText =
                    `👤 ${data.name} (ID: ${data.id})`;
            } else {
                document.getElementById("resultText").innerText =
                    "Face not detected ❌";
            }
        });
    });
}

</script>

</body>
</html>
