<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Attendance System Using Face Recognition</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --bg: #0f172a;
            --card: rgba(30, 41, 59, 0.95);
            --primary: #2563eb;
            --success: #16a34a;
            --danger: #dc2626;
            --accent: #38bdf8;
        }

        body {
            background: linear-gradient(rgba(15, 23, 42, 0.85), rgba(15, 23, 42, 0.85)), 
                        url('/static/images/Facial_Recognition_logo.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: white;
            font-family: 'Inter', -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden; 
        }

        header {
            background: var(--card);
            padding: 1rem;
            text-align: center;
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            z-index: 10;
        }

        .main-wrapper {
            display: flex;
            flex: 1;
            padding: 20px;
            gap: 20px;
            overflow: hidden;
        }

        /* 📱 MOBILE OPTIMIZATION */
        @media (max-width: 768px) {
            body { overflow-y: auto; height: auto; }
            .main-wrapper { 
                flex-direction: column-reverse; /* Camera (Right Panel) goes to TOP */
                height: auto; 
                padding: 10px;
                overflow: visible;
            }
            .left-panel { max-width: 100% !important; flex: none !important; }
            .right-panel { flex: none !important; height: 50vh !important; } /* Camera height fixed for mobile */
            .video-box { aspect-ratio: 1/1 !important; height: 100% !important; }
        }

        .left-panel {
            flex: 0 0 350px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            overflow-y: auto;
            padding-right: 5px;
        }

        .right-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--card);
            border-radius: 24px;
            padding: 15px;
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(15px);
            min-height: 0;
        }

        .panel {
            background: var(--card);
            padding: 20px;
            border-radius: 20px;
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }

        .video-box {
            position: relative;
            background: #000;
            border-radius: 15px;
            overflow: hidden;
            flex: 1; 
            border: 2px solid var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        video {
            width: 100%;
            height: 100%;
            object-fit: cover; 
            transform: scaleX(-1);
        }

        button {
            padding: 14px;
            font-weight: 700;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9rem;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        button:active { transform: scale(0.98); }
        .btn-primary { background: var(--primary); color: white; }
        .btn-success { background: var(--success); color: white; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-dark { background: #334155; color: white; }

        #trainingOverlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.95);
            z-index: 999;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .status-card {
            margin-top: auto; 
            padding: 15px;
            border-radius: 12px;
            background: rgba(56, 189, 248, 0.1);
            border: 1px solid var(--accent);
            text-align: center;
        }

        input {
            width: 100%; padding: 12px; margin-bottom: 10px;
            background: #0f172a; border: 1px solid #334155;
            border-radius: 8px; color: white; box-sizing: border-box;
        }

        .hidden { display: none !important; }
        #scanner-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            border: 4px solid var(--accent);
            box-shadow: inset 0 0 100px rgba(56, 189, 248, 0.3);
            display: none;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse { 0% { opacity: 0.3; } 50% { opacity: 0.7; } 100% { opacity: 0.3; } }
    </style>
</head>
<body>

<header>
    <h2 style="margin:0; font-weight: 800; color:var(--accent); text-transform: uppercase;">Attendance System Using Face Recognition</h2>
</header>

<div id="trainingOverlay" class="hidden">
    <div style="text-align: center;">
        <h3>⚙️ Training AI Engine...</h3>
        <div style="width: 250px; background: #334155; height: 10px; border-radius: 5px; margin: 20px auto; overflow: hidden;">
            <div id="progressBar" style="width: 0%; background: var(--accent); height: 100%; transition: 0.3s;"></div>
        </div>
        <p id="percentText" style="font-weight: bold; font-size: 2rem;">0%</p>
    </div>
</div>

<div class="main-wrapper">
    
    <div class="left-panel">
        <div id="regForm" class="panel hidden">
            <h3 style="margin-top:0; color:var(--accent);">👤 Registration</h3>
            <input id="id" type="number" placeholder="Enter Student ID">
            <input id="name" type="text" placeholder="Enter Full Name">
            <button class="btn-success" onclick="clickCapture()">📸 Save Profile</button>
            <button class="btn-dark" style="margin-top: 10px;" onclick="toggleReg(false)">Cancel</button>
        </div>

        <div id="mainControls" class="panel">
            <h4 style="margin-top:0; color:#94a3b8; font-size: 0.8rem; letter-spacing: 1px;">DASHBOARD</h4>
            <div style="display: flex; flex-direction: column; gap: 12px;">
                <button class="btn-primary" onclick="toggleReg(true)">➕ Add New Person</button>
                <button id="trainBtn" class="btn-dark" onclick="trainModel()" disabled>⚙️ Train AI Model</button>
                <button class="btn-success" onclick="startAttendanceSession()">🔔 Start Attendance</button>
                
                <div id="sessionActions" class="hidden">
                    <button class="btn-danger" onclick="manualClockOut()">⏹ Manual Clock OUT</button>
                </div>

                <a href="/attendance" style="text-decoration:none;">
                    <button class="btn-dark" style="width: 100%;">📊 Attendance Logs</button>
                </a>
            </div>
        </div>

        <div id="statusCard" class="status-card hidden">
            <h5 id="statusTitle" style="margin:0; color:var(--accent);">Ready to Scan</h5>
            <div id="scanResult" class="hidden">
                <h2 id="res-name" style="margin:10px 0 0;">---</h2>
                <p id="res-id" style="margin:5px 0 0; color:#94a3b8; font-weight: bold;">ID: ---</p>
            </div>
        </div>
    </div>

    <div class="right-panel">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
            <span id="camStatus" style="color:var(--danger); font-weight: 800; font-size: 0.8rem;">● CAMERA OFFLINE</span>
            <div id="camActions" style="display: flex; gap: 10px;">
                <button id="camBtn" class="btn-primary" style="padding: 8px 15px; width: auto;" onclick="initCamera()">Open Camera</button>
                <button id="closeCamBtn" class="btn-danger hidden" style="padding: 8px 15px; width: auto;" onclick="stopCamera()">Close</button>
            </div>
        </div>
        <div class="video-box">
            <video id="video" autoplay muted playsinline></video>
            <div id="scanner-overlay"></div>
            <div id="placeholder" style="color:#475569; text-align:center;">
                <p>📷 System Offline. Please Open Camera.</p>
            </div>
        </div>
    </div>

</div>

<script>
let stream;

async function initCamera() {
    try {
        stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
        const video = document.getElementById("video");
        video.srcObject = stream;
        document.getElementById("camStatus").innerText = "● LIVE SYSTEM ACTIVE";
        document.getElementById("camStatus").style.color = "var(--success)";
        document.getElementById("camBtn").classList.add("hidden");
        document.getElementById("closeCamBtn").classList.remove("hidden");
        document.getElementById("placeholder").classList.add("hidden");
    } catch (err) {
        alert("Camera Access Error! ❌");
    }
}

function stopCamera() {
    if (stream) { stream.getTracks().forEach(track => track.stop()); stream = null; }
    document.getElementById("video").srcObject = null;
    document.getElementById("camStatus").innerText = "● CAMERA OFFLINE";
    document.getElementById("camStatus").style.color = "var(--danger)";
    document.getElementById("camBtn").classList.remove("hidden");
    document.getElementById("closeCamBtn").classList.add("hidden");
    document.getElementById("placeholder").classList.remove("hidden");
    document.getElementById("scanner-overlay").style.display = "none";
}

function toggleReg(show) {
    if(show && !stream) { alert("Please turn on the camera first! 🎥"); return; }
    document.getElementById("regForm").classList.toggle("hidden", !show);
    document.getElementById("mainControls").classList.toggle("hidden", show);
}

async function clickCapture() {
    const id = document.getElementById("id").value.trim();
    const name = document.getElementById("name").value.trim();
    if (!id || !name) { alert("Please enter all details! ❌"); return; }

    const checkRes = await fetch("/check_id", { method: "POST", body: new URLSearchParams({'id': id}) });
    const checkResult = await checkRes.json();
    if (checkResult.exists) { alert("❌ ID is already taken!"); return; }

    const video = document.getElementById("video");
    const canvas = document.createElement("canvas");
    canvas.width = video.videoWidth; canvas.height = video.videoHeight;
    canvas.getContext("2d").drawImage(video, 0, 0);

    canvas.toBlob(blob => {
        const formData = new FormData();
        formData.append("image", blob);
        formData.append("id", id);
        formData.append("name", name);

        fetch("/upload", { method: "POST", body: formData }).then(async res => {
            if (res.status === 200) {
                alert("✅ Success: Person Profile Saved!");
                document.getElementById("trainBtn").disabled = false;
                document.getElementById("trainBtn").classList.replace("btn-dark", "btn-primary");
                toggleReg(false);
            } else { alert("⚠️ Error: " + await res.text()); }
        });
    });
}

function trainModel() {
    document.getElementById("trainingOverlay").classList.remove("hidden");
    let progress = 0;
    const bar = document.getElementById("progressBar");
    const txt = document.getElementById("percentText");

    let interval = setInterval(() => {
        progress += Math.floor(Math.random() * 5) + 2;
        if(progress > 98) progress = 98;
        bar.style.width = progress + "%";
        txt.innerText = progress + "%";
    }, 150);

    fetch("/train").then(() => {
        clearInterval(interval);
        bar.style.width = "100%";
        txt.innerText = "100%";
        setTimeout(() => {
            alert("AI Engine Training Complete! ✅");
            document.getElementById("trainingOverlay").classList.add("hidden");
            document.getElementById("trainBtn").disabled = true;
            document.getElementById("trainBtn").classList.replace("btn-primary", "btn-dark");
        }, 500);
    });
}

function startAttendanceSession() {
    if (!stream) { alert("Camera is offline! 🎥"); return; }
    let duration = prompt("Enter Session Duration (Minutes):", "60");
    if (!duration) return;

    alert("Clock IN Process Initiated!");
    document.getElementById("statusCard").classList.remove("hidden");
    document.getElementById("statusTitle").innerText = "SCANNING FOR ENTRY...";
    document.getElementById("scanner-overlay").style.display = "block";
    document.getElementById("sessionActions").classList.remove("hidden");

    processRecognition("IN");
}

function manualClockOut() {
    processRecognition("OUT");
    alert("Clock OUT Process Completed Successfully! 👋");
    stopCamera();
}

function processRecognition(type) {
    const video = document.getElementById("video");
    const canvas = document.createElement("canvas");
    canvas.width = video.videoWidth; canvas.height = video.videoHeight;
    canvas.getContext("2d").drawImage(video, 0, 0);

    canvas.toBlob(blob => {
        const formData = new FormData();
        formData.append("image", blob);
        formData.append("type", type);

        fetch("/recognize_upload", { method: "POST", body: formData })
        .then(res => res.json()).then(data => {
            document.getElementById("scanResult").classList.remove("hidden");
            if (data.status === "success") {
                document.getElementById("res-name").innerText = data.name;
                document.getElementById("res-id").innerText = "ID: " + data.id;
                document.getElementById("statusTitle").innerText = data.msg;
            } else {
                document.getElementById("res-name").innerText = "NOT RECOGNIZED";
                document.getElementById("statusTitle").innerText = "RECOGNITION FAILED";
            }
        });
    });
}
</script>
</body>
</html>
