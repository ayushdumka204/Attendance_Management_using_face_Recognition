<!DOCTYPE html>
<html>
<head>
    <title>Attendance System</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            background: #0f172a;
            color: white;
            text-align: center;
            font-family: Arial;
        }

        .container {
            margin-top: 50px;
        }

        button {
            padding: 15px 30px;
            margin: 10px;
            font-size: 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        .primary { background: #2563eb; }
        .success { background: #16a34a; }
        .danger { background: #dc2626; }
        .dark { background: #1e293b; }

        .video-container {
            position: relative;
            display: inline-block;
        }

        video, canvas {
            width: 350px;
            border-radius: 10px;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
        }

        .popup {
            display: none;
            position: fixed;
            top: 30%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #1e293b;
            padding: 20px;
            border-radius: 10px;
        }

        input {
            padding: 10px;
            margin: 5px;
        }

        progress {
            width: 250px;
            height: 20px;
        }
    </style>
</head>
<body>

<h1>🎯 Attendance Capture System</h1>

<div class="container">
    <button class="primary" onclick="openAddPerson()">Add Person</button>
    <button class="success" onclick="train()">Train Images</button>
    <button class="dark" onclick="markAttendance()">Mark Attendance</button>
    <button class="danger" onclick="manualClockOut()">⏹ Clock OUT</button>
    <a href="/attendance"><button>View Attendance</button></a>
</div>

<!-- VIDEO + CANVAS -->
<div class="video-container">
    <video id="video" autoplay></video>
    <canvas id="overlay"></canvas>
</div>

<!-- ADD PERSON POPUP -->
<div class="popup" id="addPopup">
    <h3>Enter Details</h3>
    <input id="id" placeholder="ID">
    <input id="name" placeholder="Name">
    <br><br>

    <button onclick="startCamera()">🎥 Start Camera</button>
    <br><br>
    <button onclick="clickCapture()">📸 Capture</button>
</div>

<!-- TRAIN POPUP -->
<div id="trainPopup" class="popup">
    <h3>Training Model...</h3>
    <br>
    <progress id="progressBar" value="0" max="100"></progress>
</div>

<script>

let stream;

// ===== CAMERA START =====
function startCamera() {
    navigator.mediaDevices.getUserMedia({ video: true })
    .then(s => {
        stream = s;
        const video = document.getElementById("video");
        video.srcObject = stream;
    });
}

// ===== ADD PERSON =====
function openAddPerson() {
    document.getElementById("addPopup").style.display = "block";
}

function clickCapture() {
    const id = document.getElementById("id").value;
    const name = document.getElementById("name").value;

    if (!id || !name) {
        alert("Enter ID and Name ❌");
        return;
    }

    const video = document.getElementById("video");
    const canvas = document.createElement("canvas");

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    canvas.getContext("2d").drawImage(video, 0, 0);

    canvas.toBlob(blob => {
        const formData = new FormData();
        formData.append("image", blob);
        formData.append("id", id);
        formData.append("name", name);

        fetch("/upload", {
            method: "POST",
            body: formData
        })
        .then(res => res.text())
        .then(() => {
            alert("Person Added ✅");
            closeCamera();
        });
    });
}

function closeCamera() {
    if (stream) stream.getTracks().forEach(track => track.stop());
    document.getElementById("addPopup").style.display = "none";
}

// ===== TRAIN =====
function train() {
    document.getElementById("trainPopup").style.display = "block";

    let progress = 0;
    let interval = setInterval(() => {
        progress += 10;
        document.getElementById("progressBar").value = progress;

        if (progress >= 100) {
            clearInterval(interval);

            fetch("/train")
            .then(() => {
                alert("Training Done ✅");
                document.getElementById("trainPopup").style.display = "none";
                document.getElementById("progressBar").value = 0;
            });
        }
    }, 300);
}

// ===== MARK ATTENDANCE =====
function markAttendance() {
    let duration = prompt("Enter Class Duration (minutes)");
    if (!duration) return;

    startCamera();

    setTimeout(() => {
        recognize("IN");
        alert("Clock IN ✅");

        setTimeout(() => {
            recognize("OUT");
            alert("Auto Clock OUT ⏰");
            closeCamera();
        }, duration * 60000);

    }, 2000);
}

// ===== MANUAL OUT =====
function manualClockOut() {
    recognize("OUT");
    alert("Manual Clock OUT ✅");
    closeCamera();
}

// ===== RECOGNITION + OVERLAY =====
function recognize(type) {
    const video = document.getElementById("video");
    const canvas = document.getElementById("overlay");
    const ctx = canvas.getContext("2d");

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    ctx.drawImage(video, 0, 0);

    canvas.toBlob(blob => {
        const formData = new FormData();
        formData.append("image", blob);
        formData.append("type", type);

        fetch("/recognize_upload", {
            method: "POST",
            body: formData
        })
        .then(res => res.json())
        .then(data => {

            if (data.status === "success") {

                // 🔥 DRAW BOX
                ctx.strokeStyle = "lime";
                ctx.lineWidth = 4;
                ctx.strokeRect(100, 100, 200, 200);

                // 🔥 NAME + ID
                ctx.fillStyle = "lime";
                ctx.font = "20px Arial";
                ctx.fillText(`${data.name} (${data.id})`, 100, 90);
            }
        });
    });
}

</script>

</body>
</html>
